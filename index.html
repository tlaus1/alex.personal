<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>alex</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000;
    --surface: rgba(255, 255, 255, 0.06);
    --surface-2: rgba(255, 255, 255, 0.09);
    --surface-hover: rgba(255, 255, 255, 0.12);
    --border: rgba(255, 255, 255, 0.10);
    --border-strong: rgba(255, 255, 255, 0.18);
    --text: #f5f5f7;
    --text-dim: #a1a1a6;
    --text-dimmer: #6e6e73;
    --accent: #0a84ff;
    --success: #30d158;
    --danger: #ff453a;
    --radius-lg: 28px;
    --radius-md: 18px;
    --radius-sm: 12px;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }

  body {
    background:
      radial-gradient(circle at 20% 10%, rgba(10, 132, 255, 0.10) 0%, transparent 45%),
      radial-gradient(circle at 80% 90%, rgba(125, 80, 240, 0.08) 0%, transparent 45%),
      #000;
  }

  #app {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* ============ SCREEN TRANSITIONS ============ */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    opacity: 0;
    transform: scale(0.98);
    pointer-events: none;
    transition: opacity 0.4s var(--ease), transform 0.4s var(--ease);
  }

  .screen.active {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }

  /* ============ LOGIN CARD ============ */
  .login-card {
    width: 100%;
    max-width: 360px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 40px 32px 32px;
    text-align: center;
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    box-shadow:
      0 20px 60px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.04) inset;
  }

  .avatar {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    margin: 0 auto 20px;
    background: linear-gradient(135deg, #4a4a4f 0%, #1d1d1f 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 500;
    color: var(--text);
    border: 1px solid var(--border-strong);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
  }

  .user-name {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }

  .user-hint {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 28px;
    font-weight: 400;
  }

  .pw-row {
    position: relative;
    margin-bottom: 12px;
  }

  .pw-input {
    width: 100%;
    height: 44px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border);
    border-radius: 22px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    padding: 0 48px 0 18px;
    outline: none;
    text-align: center;
    letter-spacing: 4px;
    transition: border-color 0.2s var(--ease), background 0.2s var(--ease);
  }

  .pw-input::placeholder {
    color: var(--text-dimmer);
    letter-spacing: 0;
  }

  .pw-input:focus {
    border-color: var(--accent);
    background: rgba(0, 0, 0, 0.5);
  }

  .pw-go {
    position: absolute;
    right: 4px;
    top: 4px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--text);
    border: none;
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s var(--ease), background 0.15s var(--ease);
  }

  .pw-go:hover { transform: scale(1.05); }
  .pw-go:active { transform: scale(0.95); }
  .pw-go:disabled { background: var(--text-dimmer); cursor: not-allowed; transform: none; }

  .pw-go svg { width: 16px; height: 16px; }

  .err {
    font-size: 12px;
    color: var(--danger);
    height: 16px;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.2s var(--ease);
  }

  .err.show { opacity: 1; }

  .stage-indicator {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 22px;
  }

  .stage-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.15);
    transition: background 0.3s var(--ease);
  }

  .stage-dot.active { background: var(--text); }

  /* Shake animation for wrong password */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  .login-card.shake { animation: shake 0.45s var(--ease); }

  /* ============ DASHBOARD ============ */
  .dash {
    width: 100%;
    max-width: 1100px;
    height: 100%;
    max-height: 720px;
    display: flex;
    flex-direction: column;
    padding: 0;
  }

  .dash-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 4px 28px;
  }

  .dash-greeting {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .greeting-text {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.8px;
  }

  .greeting-sub {
    font-size: 14px;
    color: var(--text-dim);
    font-weight: 400;
  }

  .dash-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .pill {
    height: 36px;
    padding: 0 16px;
    border-radius: 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: background 0.15s var(--ease), border-color 0.15s var(--ease);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .pill:hover { background: var(--surface-hover); border-color: var(--border-strong); }

  .pill svg { width: 14px; height: 14px; }

  .pill.danger { color: var(--danger); }
  .pill.danger:hover { background: rgba(255, 69, 58, 0.12); border-color: rgba(255, 69, 58, 0.35); }

  .grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-auto-rows: minmax(140px, 1fr);
    gap: 16px;
    overflow-y: auto;
    padding: 4px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 22px;
    cursor: pointer;
    transition: background 0.2s var(--ease), transform 0.2s var(--ease), border-color 0.2s var(--ease);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    display: flex;
    flex-direction: column;
    gap: 14px;
    text-align: left;
    color: var(--text);
    font-family: inherit;
  }

  .card:hover {
    background: var(--surface-hover);
    border-color: var(--border-strong);
    transform: translateY(-2px);
  }

  .card:active { transform: translateY(0); }

  .card-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
  }

  .card-icon svg { width: 18px; height: 18px; }

  .card.featured {
    grid-column: span 2;
    background: linear-gradient(135deg, rgba(10, 132, 255, 0.18) 0%, rgba(125, 80, 240, 0.10) 100%);
    border-color: rgba(10, 132, 255, 0.3);
  }

  .card.featured:hover {
    background: linear-gradient(135deg, rgba(10, 132, 255, 0.25) 0%, rgba(125, 80, 240, 0.15) 100%);
  }

  .card.featured .card-icon {
    background: var(--text);
    color: #000;
  }

  .card-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }

  .card-desc {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 400;
    line-height: 1.4;
    flex: 1;
  }

  .card-meta {
    font-size: 11px;
    color: var(--text-dimmer);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
  }

  .status-dot.off { background: var(--text-dimmer); box-shadow: none; }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 760px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .card.featured { grid-column: span 2; }
    .greeting-text { font-size: 24px; }
  }

  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
    .card.featured { grid-column: span 1; }
    .dash-top { flex-direction: column; gap: 16px; align-items: flex-start; }
  }

  /* Subtle scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
</style>
</head>
<body>

<div id="app">

  <!-- STAGE 1: PIN -->
  <div class="screen active" id="screen1">
    <div class="login-card" id="card1">
      <div class="avatar">A</div>
      <div class="user-name">alex</div>
      <div class="user-hint">Enter access code</div>

      <div class="pw-row">
        <input
          type="password"
          inputmode="numeric"
          maxlength="4"
          class="pw-input"
          id="pw1"
          placeholder="••••"
          autocomplete="off"
          autofocus
        />
        <button class="pw-go" id="go1" aria-label="Continue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M13 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
      <div class="err" id="err1">Incorrect code</div>

      <div class="stage-indicator">
        <div class="stage-dot active"></div>
        <div class="stage-dot"></div>
      </div>
    </div>
  </div>

  <!-- STAGE 2: PASSPHRASE -->
  <div class="screen" id="screen2">
    <div class="login-card" id="card2">
      <div class="avatar">A</div>
      <div class="user-name">alex</div>
      <div class="user-hint">Enter passphrase</div>

      <div class="pw-row">
        <input
          type="password"
          class="pw-input"
          id="pw2"
          placeholder="passphrase"
          autocomplete="off"
        />
        <button class="pw-go" id="go2" aria-label="Continue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M13 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
      <div class="err" id="err2">Incorrect passphrase</div>

      <div class="stage-indicator">
        <div class="stage-dot active"></div>
        <div class="stage-dot active"></div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="screen" id="screen3">
    <div class="dash">

      <div class="dash-top">
        <div class="dash-greeting">
          <div class="greeting-text" id="greeting">Hello, alex</div>
          <div class="greeting-sub" id="dateLine">—</div>
        </div>
        <div class="dash-actions">
          <button class="pill">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            Settings
          </button>
          <button class="pill danger" onclick="logout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sign out
          </button>
        </div>
      </div>

      <div class="grid">

        <!-- Featured: Remote Desktop -->
        <button class="card featured" onclick="launch('remote')">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
          </div>
          <div>
            <div class="card-title">Remote Desktop</div>
            <div class="card-desc">Stream the full desktop with both monitors. Low-latency control from anywhere.</div>
          </div>
          <div class="card-meta">
            <div class="status-dot"></div>
            Online
          </div>
        </button>

        <!-- Gaming -->
        <button class="card" onclick="launch('gaming')">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="6" y1="11" x2="10" y2="11"/>
              <line x1="8" y1="9" x2="8" y2="13"/>
              <line x1="15" y1="12" x2="15.01" y2="12"/>
              <line x1="18" y1="10" x2="18.01" y2="10"/>
              <path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258A4 4 0 0 0 17.32 5z"/>
            </svg>
          </div>
          <div>
            <div class="card-title">Gaming</div>
            <div class="card-desc">GPU-accelerated game streaming.</div>
          </div>
          <div class="card-meta">
            <div class="status-dot"></div>
            Ready
          </div>
        </button>

        <!-- Files -->
        <button class="card" onclick="launch('files')">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <div>
            <div class="card-title">Files</div>
            <div class="card-desc">Browse and transfer files securely.</div>
          </div>
          <div class="card-meta">
            <div class="status-dot"></div>
            2 TB
          </div>
        </button>

        <!-- Displays -->
        <button class="card" onclick="launch('displays')">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="9" height="14" rx="1.5"/>
              <rect x="13" y="4" width="9" height="14" rx="1.5"/>
            </svg>
          </div>
          <div>
            <div class="card-title">Displays</div>
            <div class="card-desc">Switch between monitor profiles.</div>
          </div>
          <div class="card-meta">
            <div class="status-dot"></div>
            Dual
          </div>
        </button>

        <!-- Power -->
        <button class="card" onclick="launch('power')">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
              <line x1="12" y1="2" x2="12" y2="12"/>
            </svg>
          </div>
          <div>
            <div class="card-title">Power</div>
            <div class="card-desc">Wake, sleep, restart, or shut down.</div>
          </div>
          <div class="card-meta">
            <div class="status-dot"></div>
            On
          </div>
        </button>

        <!-- Activity -->
        <button class="card" onclick="launch('activity')">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
          </div>
          <div>
            <div class="card-title">Activity</div>
            <div class="card-desc">Recent sessions and login history.</div>
          </div>
          <div class="card-meta">
            <div class="status-dot"></div>
            Live
          </div>
        </button>

      </div>

    </div>
  </div>

</div>

<script>
  const $ = id => document.getElementById(id);
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  const STAGE1_CODE = '9171';
  const STAGE2_CODE = 'alexissupercool';

  // ============ SCREEN SWITCHER ============
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $(id).classList.add('active');
  }

  // ============ STAGE 1 ============
  $('go1').addEventListener('click', tryStage1);
  $('pw1').addEventListener('keydown', e => { if (e.key === 'Enter') tryStage1(); });

  async function tryStage1() {
    const val = $('pw1').value;
    if (val === STAGE1_CODE) {
      $('err1').classList.remove('show');
      await sleep(200);
      showScreen('screen2');
      setTimeout(() => $('pw2').focus(), 400);
    } else {
      $('err1').classList.add('show');
      $('card1').classList.add('shake');
      setTimeout(() => $('card1').classList.remove('shake'), 500);
      $('pw1').select();
    }
  }

  // ============ STAGE 2 ============
  $('go2').addEventListener('click', tryStage2);
  $('pw2').addEventListener('keydown', e => { if (e.key === 'Enter') tryStage2(); });

  async function tryStage2() {
    const val = $('pw2').value;
    if (val === STAGE2_CODE) {
      $('err2').classList.remove('show');
      await sleep(200);
      showScreen('screen3');
      updateGreeting();
    } else {
      $('err2').classList.add('show');
      $('card2').classList.add('shake');
      setTimeout(() => $('card2').classList.remove('shake'), 500);
      $('pw2').select();
    }
  }

  // ============ DASHBOARD ============
  function updateGreeting() {
    const h = new Date().getHours();
    let g = 'Hello';
    if (h < 5) g = 'Up late';
    else if (h < 12) g = 'Good morning';
    else if (h < 18) g = 'Good afternoon';
    else g = 'Good evening';
    $('greeting').textContent = `${g}, alex`;

    const opts = { weekday: 'long', month: 'long', day: 'numeric' };
    $('dateLine').textContent = new Date().toLocaleDateString(undefined, opts);
  }

  function launch(mod) {
    // Placeholder — wire each up later to your actual endpoints
    alert(`${mod} module — not yet connected.`);
  }

  function logout() {
    $('pw1').value = '';
    $('pw2').value = '';
    $('err1').classList.remove('show');
    $('err2').classList.remove('show');
    showScreen('screen1');
    setTimeout(() => $('pw1').focus(), 400);
  }
</script>

</body>
</html>
